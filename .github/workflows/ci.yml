name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall app

      - name: Build API image
        run: docker build -f Dockerfile.api -t telco-churn-api:ci .

      - name: Build ETL image
        run: docker build -f Dockerfile.pipeline -t telco-churn-pipeline:ci .
